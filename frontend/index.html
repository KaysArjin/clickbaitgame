<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clickbait Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Clickbait Game</h1>

    <div id="setup">
        <input type="text" id="playerName" placeholder="Enter your name">
        <button id="joinGame">Join Game</button>
    </div>

    <div id="gameArea" style="display: none;">
        <h2>Game in Progress</h2>
        <p id="judgeDisplay"></p>
        <p id="gameStatus">Waiting for players...</p>
        <h3>Players:</h3>
        <ul id="playerList"></ul>
    </div>

    <div id="linkSubmission" style="display: none;">
        <h3>Submit Your Wikipedia Link</h3>
        <input type="text" id="wikiLink" placeholder="Paste your Wikipedia link">
        <button id="submitLink">Submit</button>
    </div>

    <div id="judgeView" style="display: none;">
        <h3>Judge: Here is the link</h3>
        <a id="randomLink" href="#" target="_blank">View Wikipedia Link</a>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
